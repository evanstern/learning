<svg viewBox="0 0 1360 920" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">educate plugin — decision tree and gates</title>
  <desc id="desc">Three entry flows of the educate plugin: the start installer's clobber/verify decisions, the lesson lifecycle ladder with the Definition-of-Done gate before 'done', and the global Stop hook gate with its loop-guard, educate-project no-op, and DoD block.</desc>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8a8a90"/></marker>
    <style>
      .n{fill:#f4f4f5;stroke:#cfcfd4;stroke-width:1.5}
      .acc{fill:#e8effc;stroke:#3b6fd4;stroke-width:1.5}
      .dec{fill:#fff6e5;stroke:#d68a1a;stroke-width:1.5}
      .gate{fill:#fff6e5;stroke:#d68a1a;stroke-width:2.6}
      .ok{fill:#e7f4ec;stroke:#2e9e5b;stroke-width:1.5}
      .no{fill:#fcebea;stroke:#d14b43;stroke-width:1.5}
      .dash{stroke-dasharray:5 4}
      .t{fill:#1d1d1f}.s{fill:#5f5f66}.acct{fill:#2f59ac}.dect{fill:#8a5a10}.okt{fill:#1f7a44}.not{fill:#a5322b}
      .edge{stroke:#8a8a90;stroke-width:1.6;fill:none}
      .lbl{fill:#6b6b70;font-size:11px}
      text{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    </style>
  </defs>

  <rect x="0" y="0" width="1360" height="920" fill="#ffffff"/>
  <text x="40" y="34" class="t" font-size="22" font-weight="700">educate plugin — decision tree &amp; gates</text>
  <text x="40" y="55" class="s" font-size="13">Three entry flows. Diamonds are decisions; thick-bordered diamonds are gates that can block.</text>

  <!-- column headers -->
  <text x="230" y="84" class="acct" font-size="14" font-weight="700" text-anchor="middle">skills/start — installer</text>
  <text x="665" y="84" class="acct" font-size="14" font-weight="700" text-anchor="middle">skills/lesson — lifecycle &amp; DoD</text>
  <text x="1055" y="84" class="acct" font-size="14" font-weight="700" text-anchor="middle">Stop hook — runtime gate</text>

  <!-- =================== COLUMN 1: start =================== -->
  <rect class="acc" x="100" y="96" width="260" height="40" rx="8"/><text x="230" y="121" class="acct" font-size="13" font-weight="700" text-anchor="middle">invoke educate:start</text>
  <line class="edge" x1="230" y1="136" x2="230" y2="158" marker-end="url(#ar)"/>
  <rect class="n" x="100" y="158" width="260" height="40" rx="8"/><text x="230" y="183" class="t" font-size="12.5" text-anchor="middle">pick project folder &lt;root&gt;</text>
  <line class="edge" x1="230" y1="198" x2="230" y2="222" marker-end="url(#ar)"/>

  <polygon class="dec" points="230,222 330,266 230,310 130,266"/>
  <text x="230" y="261" class="dect" font-size="11.5" text-anchor="middle">CLAUDE.md or</text>
  <text x="230" y="276" class="dect" font-size="11.5" text-anchor="middle">topics/ exist?</text>
  <!-- yes -> clobber stop -->
  <line class="edge" x1="330" y1="266" x2="372" y2="266" marker-end="url(#ar)"/>
  <text x="345" y="258" class="lbl">yes</text>
  <rect class="no" x="372" y="244" width="118" height="44" rx="8"/><text x="431" y="263" class="not" font-size="11" text-anchor="middle">stop — ask</text><text x="431" y="277" class="not" font-size="11" text-anchor="middle">before clobber</text>
  <!-- no -> continue -->
  <text x="244" y="328" class="lbl">no</text>
  <line class="edge" x1="230" y1="310" x2="230" y2="334" marker-end="url(#ar)"/>
  <rect class="n" x="100" y="334" width="260" height="44" rx="8"/><text x="230" y="353" class="t" font-size="12" text-anchor="middle">plant CLAUDE.md</text><text x="230" y="369" class="s" font-size="11" text-anchor="middle">(from templates/CLAUDE.md)</text>
  <line class="edge" x1="230" y1="378" x2="230" y2="400" marker-end="url(#ar)"/>
  <rect class="n" x="100" y="400" width="260" height="44" rx="8"/><text x="230" y="419" class="t" font-size="12" text-anchor="middle">plant _template/ + schema</text><text x="230" y="435" class="s" font-size="11" text-anchor="middle">into &lt;root&gt;/topics/</text>
  <line class="edge" x1="230" y1="444" x2="230" y2="466" marker-end="url(#ar)"/>

  <polygon class="dec" points="230,466 330,510 230,554 130,510"/>
  <text x="230" y="507" class="dect" font-size="11.5" text-anchor="middle">all files</text>
  <text x="230" y="522" class="dect" font-size="11.5" text-anchor="middle">on disk?</text>
  <line class="edge" x1="330" y1="510" x2="372" y2="510" marker-end="url(#ar)"/>
  <text x="345" y="502" class="lbl">no</text>
  <rect class="no" x="372" y="488" width="118" height="44" rx="8"/><text x="431" y="507" class="not" font-size="10.5" text-anchor="middle">report failure</text><text x="431" y="521" class="not" font-size="10.5" text-anchor="middle">(don't claim done)</text>
  <text x="244" y="572" class="lbl">yes</text>
  <line class="edge" x1="230" y1="554" x2="230" y2="578" marker-end="url(#ar)"/>
  <rect class="ok" x="100" y="578" width="260" height="48" rx="8"/><text x="230" y="599" class="okt" font-size="12" font-weight="700" text-anchor="middle">verified — report created</text><text x="230" y="616" class="okt" font-size="11" text-anchor="middle">hand off to educate:lesson</text>

  <!-- =================== COLUMN 2: lifecycle =================== -->
  <rect class="acc" x="545" y="92" width="240" height="38" rx="8"/><text x="665" y="116" class="acct" font-size="13" font-weight="700" text-anchor="middle">invoke educate:lesson</text>
  <line class="edge" x1="665" y1="130" x2="665" y2="146" marker-end="url(#ar)"/>
  <rect class="n" x="545" y="146" width="240" height="36" rx="8"/><text x="665" y="169" class="t" font-size="13" font-weight="700" text-anchor="middle">scaffolded</text>
  <line class="edge" x1="665" y1="182" x2="665" y2="196" marker-end="url(#ar)"/>
  <rect class="n" x="545" y="196" width="240" height="36" rx="8"/><text x="665" y="219" class="t" font-size="13" font-weight="700" text-anchor="middle">taught</text>
  <line class="edge" x1="665" y1="232" x2="665" y2="246" marker-end="url(#ar)"/>
  <rect class="n dash" x="545" y="246" width="240" height="36" rx="8"/><text x="665" y="269" class="t" font-size="12.5" text-anchor="middle">spec'd  ·  delegated only</text>
  <line class="edge dash" x1="665" y1="282" x2="665" y2="296" marker-end="url(#ar)"/>
  <rect class="n dash" x="545" y="296" width="240" height="36" rx="8"/><text x="665" y="319" class="t" font-size="12.5" text-anchor="middle">built  ·  delegated only</text>
  <line class="edge" x1="665" y1="332" x2="665" y2="346" marker-end="url(#ar)"/>
  <rect class="n" x="545" y="346" width="240" height="36" rx="8"/><text x="665" y="369" class="t" font-size="13" font-weight="700" text-anchor="middle">decked</text>
  <line class="edge" x1="665" y1="382" x2="665" y2="398" marker-end="url(#ar)"/>

  <!-- DoD gate -->
  <polygon class="gate" points="665,398 785,448 665,498 545,448"/>
  <text x="665" y="438" class="dect" font-size="11.5" font-weight="700" text-anchor="middle">GATE · progress.mjs --check</text>
  <text x="665" y="454" class="dect" font-size="11.5" text-anchor="middle">all required artifacts</text>
  <text x="665" y="469" class="dect" font-size="11.5" text-anchor="middle">on disk?</text>
  <!-- no -> blocked -->
  <line class="edge" x1="785" y1="448" x2="822" y2="448" marker-end="url(#ar)"/>
  <text x="795" y="440" class="lbl">no</text>
  <rect class="no" x="822" y="426" width="78" height="44" rx="8"/><text x="861" y="445" class="not" font-size="10" text-anchor="middle">blocked —</text><text x="861" y="458" class="not" font-size="10" text-anchor="middle">not done</text>
  <!-- yes -> done -->
  <text x="679" y="516" class="lbl">yes</text>
  <line class="edge" x1="665" y1="498" x2="665" y2="518" marker-end="url(#ar)"/>
  <rect class="ok" x="545" y="518" width="240" height="42" rx="8"/><text x="665" y="545" class="okt" font-size="14" font-weight="700" text-anchor="middle">done</text>

  <rect class="n dash" x="545" y="580" width="240" height="78" rx="8"/>
  <text x="557" y="601" class="s" font-size="11">• run --sync at start &amp; end</text>
  <text x="557" y="619" class="s" font-size="11">• never pass 'built' w/o deck+guide</text>
  <text x="557" y="637" class="s" font-size="11">• gate is git-agnostic (artifacts,</text>
  <text x="557" y="651" class="s" font-size="11">   not commits)</text>

  <!-- =================== COLUMN 3: Stop hook =================== -->
  <rect class="acc" x="935" y="96" width="240" height="44" rx="8"/><text x="1055" y="116" class="acct" font-size="12.5" font-weight="700" text-anchor="middle">Stop event</text><text x="1055" y="132" class="acct" font-size="11" text-anchor="middle">Claude tries to finish</text>
  <line class="edge" x1="1055" y1="140" x2="1055" y2="160" marker-end="url(#ar)"/>
  <rect class="n" x="935" y="160" width="240" height="38" rx="8"/><text x="1055" y="184" class="t" font-size="12.5" font-weight="700" text-anchor="middle">hooks → gate.sh</text>
  <line class="edge" x1="1055" y1="198" x2="1055" y2="216" marker-end="url(#ar)"/>

  <polygon class="dec" points="1055,216 1150,256 1055,296 960,256"/>
  <text x="1055" y="252" class="dect" font-size="11" text-anchor="middle">stop_hook</text>
  <text x="1055" y="266" class="dect" font-size="11" text-anchor="middle">_active?</text>
  <line class="edge" x1="1150" y1="256" x2="1192" y2="256" marker-end="url(#ar)"/>
  <text x="1165" y="248" class="lbl">yes</text>
  <rect class="ok" x="1192" y="234" width="138" height="44" rx="8"/><text x="1261" y="253" class="okt" font-size="11" font-weight="700" text-anchor="middle">exit 0 — ALLOW</text><text x="1261" y="267" class="okt" font-size="10" text-anchor="middle">loop guard</text>
  <text x="1069" y="314" class="lbl">no</text>
  <line class="edge" x1="1055" y1="296" x2="1055" y2="320" marker-end="url(#ar)"/>

  <rect class="n" x="935" y="320" width="240" height="50" rx="8"/><text x="1055" y="340" class="t" font-size="11.5" text-anchor="middle">resolve project root</text><text x="1055" y="356" class="s" font-size="10.5" text-anchor="middle">--root / env / walk up for topics/</text>
  <line class="edge" x1="1055" y1="370" x2="1055" y2="390" marker-end="url(#ar)"/>

  <polygon class="dec" points="1055,390 1150,432 1055,474 960,432"/>
  <text x="1055" y="428" class="dect" font-size="11" text-anchor="middle">educate</text>
  <text x="1055" y="442" class="dect" font-size="11" text-anchor="middle">project?</text>
  <line class="edge" x1="1150" y1="432" x2="1192" y2="432" marker-end="url(#ar)"/>
  <text x="1165" y="424" class="lbl">no</text>
  <rect class="ok" x="1192" y="410" width="138" height="44" rx="8"/><text x="1261" y="429" class="okt" font-size="11" font-weight="700" text-anchor="middle">exit 0 — ALLOW</text><text x="1261" y="443" class="okt" font-size="10" text-anchor="middle">no-op (global hook)</text>
  <text x="1069" y="492" class="lbl">yes</text>
  <line class="edge" x1="1055" y1="474" x2="1055" y2="498" marker-end="url(#ar)"/>

  <rect class="n" x="935" y="498" width="240" height="38" rx="8"/><text x="1055" y="522" class="t" font-size="12" text-anchor="middle">progress.mjs --all --gate</text>
  <line class="edge" x1="1055" y1="536" x2="1055" y2="556" marker-end="url(#ar)"/>

  <polygon class="gate" points="1055,556 1150,600 1055,644 960,600"/>
  <text x="1055" y="593" class="dect" font-size="10.5" font-weight="700" text-anchor="middle">DoD violation?</text>
  <text x="1055" y="608" class="dect" font-size="10" text-anchor="middle">lesson past its</text>
  <text x="1055" y="621" class="dect" font-size="10" text-anchor="middle">artifacts?</text>
  <line class="edge" x1="1150" y1="600" x2="1192" y2="600" marker-end="url(#ar)"/>
  <text x="1165" y="592" class="lbl">yes</text>
  <rect class="no" x="1192" y="578" width="138" height="44" rx="8"/><text x="1261" y="597" class="not" font-size="11" font-weight="700" text-anchor="middle">exit 2 — BLOCK</text><text x="1261" y="611" class="not" font-size="10" text-anchor="middle">stderr → Claude</text>
  <text x="1069" y="662" class="lbl">no</text>
  <line class="edge" x1="1055" y1="644" x2="1055" y2="668" marker-end="url(#ar)"/>
  <rect class="ok" x="935" y="668" width="240" height="42" rx="8"/><text x="1055" y="694" class="okt" font-size="12" font-weight="700" text-anchor="middle">exit 0 — ALLOW finish</text>

  <!-- =================== legend / modes =================== -->
  <line x1="40" y1="748" x2="1320" y2="748" stroke="#e3e3e6" stroke-width="1"/>
  <text x="40" y="772" class="t" font-size="13" font-weight="700">Legend</text>
  <rect class="acc" x="40" y="784" width="20" height="14" rx="3"/><text x="68" y="795" class="s" font-size="11">entry point</text>
  <rect class="dec" x="170" y="784" width="20" height="14" rx="3"/><text x="198" y="795" class="s" font-size="11">decision</text>
  <rect class="gate" x="285" y="784" width="20" height="14" rx="3"/><text x="313" y="795" class="s" font-size="11">gate (can block)</text>
  <rect class="ok" x="445" y="784" width="20" height="14" rx="3"/><text x="473" y="795" class="s" font-size="11">allow / pass (exit 0)</text>
  <rect class="no" x="625" y="784" width="20" height="14" rx="3"/><text x="653" y="795" class="s" font-size="11">block / fail (exit 2)</text>
  <line x1="785" y1="791" x2="815" y2="791" class="edge dash"/><text x="822" y="795" class="s" font-size="11">delegated-build only</text>

  <text x="40" y="832" class="t" font-size="13" font-weight="700">progress.mjs modes</text>
  <text x="40" y="852" class="s" font-size="11.5"><tspan class="t" font-weight="700">--sync</tspan>  recompute the derived artifacts map from disk and write it (run at lesson start &amp; end).</text>
  <text x="40" y="870" class="s" font-size="11.5"><tspan class="t" font-weight="700">--check</tspan>  validate everything incl. a stale map; exits 1 on any problem (manual / lesson boundary).</text>
  <text x="40" y="888" class="s" font-size="11.5"><tspan class="t" font-weight="700">--gate</tspan>  read-only; blocks ONLY on real DoD violations; no-op outside an educate project (used by the Stop hook).</text>
</svg>
